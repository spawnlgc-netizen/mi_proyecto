 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iQR System</title>
    <style>
        
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: sans-serif; }
        
      
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
       
        #contenido { display: none; text-align: center; color: white; padding: 20px; }
        .mi-qr { width: 200px; height: 200px; margin: 20px auto; border: 5px solid white; }
    </style>
</head>
<body>

    <div id="splash">
        <video id="video-player" autoplay muted playsinline>
            <source src="presentacion.mp4" type="video/mp4">
        </video>
    </div>

    <div id="contenido">
        <h1>¡Bienvenido </h1>
        <p> está listo.</p>
        
        <img src="qr_cliente.png" class="mi-qr" alt="QR del Cliente">
        
        <a href="archivo_cliente.pdf" style="display:block; padding:15px; background:blue; color:white; border-radius:10px;">
            
        </a>
    </div>

    <script>
        const video = document.getElementById('video-player');
        const splash = document.getElementById('splash');
        const contenido = document.getElementById('contenido');
        
        
        video.onended = () => { 
            splash.style.display = 'none'; 
            contenido.style.display = 'block'; 
        };
    </script>
</body>
</html>
